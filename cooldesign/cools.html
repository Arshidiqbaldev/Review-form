<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter App</title>
  <link rel="stylesheet" href="cools.css">

</head>

<body>
  <div class="content">

    <div class="parent">
      <div class="user-info">
        <img src="imgs/arshid.png" alt="arshid" class="user-img">
        <svg xmlns="http://www.w3.org/2000/svg" class="animated-icon"
          viewBox="0 0 24 24"><!-- Icon from SVG Spinners by Utkarsh Verma - https://github.com/n3r4zzurr0/svg-spinners/blob/main/LICENSE -->
          <circle cx="12" cy="12" r="3" fill="#F60900" />
          <g>
            <circle cx="4" cy="12" r="3" fill="currentColor" />
            <circle cx="20" cy="12" r="3" fill="currentColor" />
            <animateTransform attributeName="transform" calcMode="spline" dur="1.5s"
              keySplines=".36,.6,.31,1;.36,.6,.31,1" repeatCount="indefinite" type="rotate"
              values="0 12 12;180 12 12;360 12 12" />
          </g>
        </svg>

      </div>

      <div class="count-display">

        <span id="countDisplay">0</span><span class="red-tag">%</span>

      </div>



      <div class="controls">
        <svg xmlns="http://www.w3.org/2000/svg" class="cont-icon" id="dec"
          viewBox="0 0 24 24"><!-- Icon from Huge Icons by Hugeicons - undefined -->
          <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M20 12H4" />
        </svg>

        <button class="reset" id="cont-reset">Reset</button>


        <svg xmlns="http://www.w3.org/2000/svg" class="cont-icon" id="inc"
          viewBox="0 0 24 24"><!-- Icon from Huge Icons by Hugeicons - undefined -->
          <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 4v16m8-8H4" />
        </svg>
      </div>





    </div>


  </div>


  <script src="cools.js"></script>
</body>

</html>
