<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theme Switcher with Icons</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --button-bg: #f0f0f0;
      --button-text: #000000;
      --link-color: #0066cc;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
    }

    .switcher {
      margin: 20px;
      display: flex;
      gap: 10px;
    }

    .switcher button {
      font-size: 20px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: var(--button-bg);
      color: var(--button-text);
      transition: background 0.3s, color 0.3s;
    }

    button.active {
      outline: 2px solid #0078d7;
    }

    a {
      color: var(--link-color);
      text-decoration: none;
      transition: color 0.3s;
    }
  </style>
</head>
<body>
  <div class="switcher">
    <button id="lightBtn">☀️</button>
    <button id="darkBtn">🌙</button>
    <button id="systemBtn">🖥️</button>
  </div>

  <h1>Hello Theme Switcher</h1>
  <p>This is some sample text. Try switching themes!</p>
  <button>Click Me</button>
  <p>Visit <a href="#">this link</a> for more info.</p>

  <script>
    const root = document.documentElement;
    const buttons = {
      light: document.getElementById("lightBtn"),
      dark: document.getElementById("darkBtn"),
      system: document.getElementById("systemBtn")
    };

    function setVariables(theme) {
      // remove active state
      Object.values(buttons).forEach(btn => btn.classList.remove("active"));

      if (theme === "light") {
        root.style.setProperty("--bg-color", "#ffffff");
        root.style.setProperty("--text-color", "#000000");
        root.style.setProperty("--button-bg", "#f0f0f0");
        root.style.setProperty("--button-text", "#000000");
        root.style.setProperty("--link-color", "#0066cc");
        buttons.light.classList.add("active");
      } else if (theme === "dark") {
        root.style.setProperty("--bg-color", "#121212");
        root.style.setProperty("--text-color", "#ffffff");
        root.style.setProperty("--button-bg", "#333333");
        root.style.setProperty("--button-text", "#ffffff");
        root.style.setProperty("--link-color", "#66aaff");
        buttons.dark.classList.add("active");
      } else if (theme === "system") {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        setVariables(prefersDark ? "dark" : "light");
        buttons.system.classList.add("active");
      }
    }

    buttons.light.addEventListener("click", () => setVariables("light"));
    buttons.dark.addEventListener("click", () => setVariables("dark"));
    buttons.system.addEventListener("click", () => setVariables("system"));

    // Apply default system theme on load
    setVariables("system");

    // Listen for system theme changes
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e => {
      if (buttons.system.classList.contains("active")) {
        setVariables("system");
      }
    });
  </script>
</body>
</html>
