<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Degital clock</title>
    <link rel="stylesheet" href="clock.css">
</head>

<body>
    <div class="content">
        <div class="clock-card">

            <div id="displayTime" class="display-time">
                <span id="hh" class="hh">00</span>:<span id="mm" class="mm">00</span><span id="ss" class="ss">00</span>
            </div>
            <div id="displayDate" class="display-date"></div>

        </div>
    </div>

    <script src="clock.js"></script>
</body>

</html>
