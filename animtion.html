<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    /* =========================================================
FULL APP FLOW EXPLAINED
Goal:
Understand how ALL functions connect together
========================================================= */


    /* =========================================================
       STEP 1 = MAIN DATA STORAGE
    ========================================================= */

    const tasks = [

      /* First task object */
      {
        text: "Learn JavaScript",
        priority: "high",
        done: false
      },

      /* Second task object */
      {
        text: "Go Walk",
        priority: "low",
        done: true
      }

    ];


    /* =========================================================
       IMPORTANT RULE OF THIS APP
    
       1. First change data inside tasks[]
       2. Then call renderTasks()
    
       renderTasks() = redraw UI again
    ========================================================= */



    /* =========================================================
       FUNCTION 1 = renderTasks()
    
       This is the HEART of app.
    
       Every time data changes:
       - add task
       - delete task
       - checkbox click
    
       We call renderTasks()
    
       It rebuilds all task HTML again
    ========================================================= */

    function renderTasks() {

      /* Get empty container from HTML */
      const list = document.getElementById("taskList");



      /* Remove old tasks first */
      list.innerHTML = "";



      /* Loop all tasks one by one */
      tasks.forEach(function (task, index) {

        /*
          task  = current task object
          index = current task number
    
          Example:
    
          First task:
          task = {text:"Learn JS"...}
          index = 0
    
          Second task:
          index = 1
        */



        /* Create new div for one task */
        const item = document.createElement("div");



        /* Add CSS class */
        item.classList.add("task-item");



        /* If completed task */
        if (task.done) {

          /* Add done class */
          item.classList.add("done");
        }



        /* Create HTML inside task box */
        item.innerHTML = `

      <!-- CHECKBOX -->

      <input
        type="checkbox"

        /* If task.done true => checked */
        ${task.done ? "checked" : ""}

        /*
          When checkbox clicked:

          Runs:
          toggleTask(index)

          Example:
          toggleTask(0)
        */
        onchange="toggleTask(${index})"
      >



      <!-- Task Name -->
      <span class="task-text">
        ${task.text}
      </span>



      <!-- Priority -->
      <span>
        ${task.priority}
      </span>



      <!-- Delete Button -->

      <button

        /*
          When delete clicked:

          Runs:
          deleteTask(index)
        */
        onclick="deleteTask(${index})"

      >
        X
      </button>

    `;



        /* Put task inside page */
        list.appendChild(item);

      });

    }



    /* =========================================================
       FUNCTION 2 = addTask()
    
       Connected with HTML button:
    
       <button onclick="addTask()">
    
       Means when Add clicked:
       this function runs
    ========================================================= */

    function addTask() {



      /* Read input text */
      const text =
        document.getElementById("taskInput").value.trim();



      /* Read dropdown priority */
      const priority =
        document.getElementById("priorityInput").value;



      /* If no text */
      if (text === "") return;



      /*
        Add NEW object inside tasks[]
    
        So data changed here
      */
      tasks.push({

        text: text,
        priority: priority,
        done: false

      });



      /* Clear input box */
      document.getElementById("taskInput").value = "";



      /*
        Now redraw screen
    
        So new task appears
      */
      renderTasks();

    }



    /* =========================================================
       FUNCTION 3 = toggleTask(index)
    
       Connected from checkbox:
    
       onchange="toggleTask(0)"
       onchange="toggleTask(1)"
    ========================================================= */

    function toggleTask(index) {



      /*
        Reverse done value
    
        false => true
        true  => false
      */
      tasks[index].done =
        !tasks[index].done;



      /*
        Redraw screen
    
        So checkbox + line-through updates
      */
      renderTasks();

    }



    /* =========================================================
       FUNCTION 4 = deleteTask(index)
    
       Connected from delete button:
    
       onclick="deleteTask(0)"
    ========================================================= */

    function deleteTask(index) {



      /*
        Remove task from array
    
        index = position
        1 = remove one item
      */
      tasks.splice(index, 1);



      /*
        Redraw screen
    
        Deleted task disappears
      */
      renderTasks();

    }



    /* =========================================================
       FUNCTION CONNECTION MAP
    ========================================================= */

    /*
    
    USER clicks ADD button
            ↓
    addTask()
            ↓
    tasks.push(...)
            ↓
    renderTasks()
    
    
    
    USER clicks CHECKBOX
            ↓
    toggleTask(index)
            ↓
    done true/false
            ↓
    renderTasks()
    
    
    
    USER clicks DELETE
            ↓
    deleteTask(index)
            ↓
    tasks.splice(...)
            ↓
    renderTasks()
    
    
    
    SO:
    
    renderTasks() is final common function
    Every road goes to renderTasks()
    
    */



    /* =========================================================
       ENTER KEY SUPPORT
    ========================================================= */

    document
      .getElementById("taskInput")
      .addEventListener("keydown", function (e) {

        /* If user presses Enter */
        if (e.key === "Enter") {

          /* Same as Add button click */
          addTask();
        }

      });



    /* =========================================================
       PAGE LOAD START
    
       Without this nothing shows
    ========================================================= */

    renderTasks();
  </script>
</body>

</html>
