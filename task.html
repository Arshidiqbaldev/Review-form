<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task App Learning Version</title>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 30px;
        }

        .app {
            max-width: 600px;
            margin: auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* ===== INPUT SECTION ===== */
        .form-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input,
        select,
        button {
            padding: 10px;
        }

        input {
            flex: 1;
        }

        button {
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        /* ===== TASK LIST ===== */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-text {
            flex: 1;
        }

        .done .task-text {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .high {
            color: red;
        }

        .medium {
            color: orange;
        }

        .low {
            color: green;
        }
    </style>
</head>

<body>

    <div class="app">

        <h1>Task App</h1>

        <!-- =============================
       INPUT SECTION
       ============================= -->
        <div class="form-box">

            <div class="input-row">

                <!-- User writes task here -->
                <input type="text" id="taskInput" placeholder="Enter task">

                <!-- User chooses priority -->
                <select id="priorityInput">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>

                <!-- Click = addTask() function runs -->
                <button onclick="addTask()">Add</button>

            </div>

            <!-- Hidden error message -->
            <p class="error" id="error">Please enter task first</p>

        </div>

        <!-- Where tasks will appear -->
        <div class="task-list" id="taskList"></div>
       

    </div>

    <script>

        /* ==================================================
           ARRAY = STORE ALL TASKS
           Each task is an object
        ================================================== */

        const tasks = [

            {
                text: "Learn JavaScript",
                priority: "high",
                done: false
            },

            {
                text: "Go Walk",
                priority: "low",
                done: true
            }

        ];


        /* ==================================================
           FUNCTION 1 = renderTasks()
           JOB:
           Show all tasks on screen
           Whenever data changes:
           - add task
           - delete task
           - complete task
           We run renderTasks()
        ================================================== */

        function renderTasks() {

            /* Get task list container */
            const list = document.getElementById("taskList");

            /* Clear old HTML first
               Otherwise duplicate tasks appear */
            list.innerHTML = "";



            /* Loop through every task */
            tasks.forEach(function (task, index) {

                /* Create new div for each task */
                const item = document.createElement("div");

                /* Add class */
                item.classList.add("task-item");



                /* If task completed */
                if (task.done) {
                    item.classList.add("done");
                }



                /* Add HTML inside task box */
                item.innerHTML = `

      <!-- Checkbox -->
      <input
        type="checkbox"
        ${task.done ? "checked" : ""}
        onchange="toggleTask(${index})"
      >

      <!-- Task text -->
      <span class="task-text">
        ${task.text}
      </span>

      <!-- Priority -->
      <span class="${task.priority}">
        ${task.priority}
      </span>

      <!-- Delete button -->
      <button onclick="deleteTask(${index})">
        X
      </button>

    `;



                /* Put task inside page */
                list.appendChild(item);

            });

        }



        /* ==================================================
           FUNCTION 2 = addTask()
        
           JOB:
           Add new task into array
        ================================================== */

        function addTask() {

            /* Get input value */
            const text = document.getElementById("taskInput").value.trim();

            /* Get priority value */
            const priority = document.getElementById("priorityInput").value;

            /* Get error element */
            const error = document.querySelector(".error");



            /* If empty input */
            if (text === "") {

                error.style.display = "block";

                return; /* Stop function */
            }



            /* Hide error if text exists */
            error.style.display = "none";



            /* Add new object inside array */
            tasks.push({

                text: text,
                priority: priority,
                done: false

            });



            /* Empty input box */
            document.getElementById("taskInput").value = "";



            /* Refresh UI */
            renderTasks();

        }



        /* ==================================================
           FUNCTION 3 = toggleTask(index)
        
           JOB:
           Complete / uncomplete task
        ================================================== */

        function toggleTask(index) {

            /* Change true to false OR false to true */
            tasks[index].done = !tasks[index].done;

            /* Refresh UI */
            renderTasks();

        }



        /* ==================================================
           FUNCTION 4 = deleteTask(index)
        
           JOB:
           Remove task from array
        ================================================== */

        function deleteTask(index) {

            /* Remove 1 item from index */
            tasks.splice(index, 1);

            /* Refresh UI */
            renderTasks();

        }



        /* ==================================================
           ENTER KEY SUPPORT
        ================================================== */

        document.getElementById("taskInput")
            .addEventListener("keydown", function (e) {

                if (e.key === "Enter") {
                    addTask();
                }

            });



        /* ==================================================
           START APP FIRST TIME
        ================================================== */

        renderTasks();

    </script>

</body>

</html>
