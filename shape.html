<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Scroll Animations Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 300vh;
            background: #111;
            color: white;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
        }

        /* 1. Scroll Progress Bar */
        .progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 5px;
            width: 100%;
            background: #f60900;
            border-radius: 20px;
            transform-origin: left;
            animation: grow linear;
            animation-timeline: scroll();

        }

        @keyframes grow {
            from {
                transform: scaleX(0);
            }

            to {
                transform: scaleX(1);
            }
        }

        /* 2. Scroll Driven Box */
        .box {
            width: 100px;
            height: 100px;
            background: #ff6900;
            margin: 200px auto;
            animation: move linear;
            animation-timeline: scroll();
        }

        @keyframes move {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(400px);
            }
        }

        /* 3. View-based Animation */
        .card {
            width: 220px;
            height: 220px;
            background: #d971ff;
            margin: 100vh auto;
            display: flex;
            align-items: center;
            justify-content: center;

            animation: fadeUp linear;
            animation-timeline: view();
            animation-range: entry 0% cover 40%;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(80px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="progress"></div>

    <h1>CSS Scroll Animations (No JS)</h1>

    <div class="box"></div>

    <div class="card">Scroll Triggered</div>

</body>

</html>
