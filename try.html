<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Fade Up Scroll Animation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    /* Just for spacing so you can scroll */
    .spacer {
      height: 100vh;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
    }


    .parent {
      overflow: hidden;

    }

    /* Animation base */
    .fade-up {
      opacity: 0;



    }



    /* When visible */
    .fade-up.visible {
      animation: fadeUp 0.6s ease-out forwards;
    }

    .fade-up:nth-child(1) {
      animation-delay: 0s;
    }

    .fade-up:nth-child(2) {
      animation-delay: 0.5s;
    }

    .fade-up:nth-child(3) {
      animation-delay: 1s;
    }






    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(100px);
      }


      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Box styling */
    .box {
      background: #ff6900;
      color: white;
      padding: 40px;
      margin: 20px;
      font-size: 24px;
      border-radius: 30px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="spacer">
    <h1>Scroll Down 👇</h1>
  </div>

  <div class="parent">
    <div class="box fade-up">Box 1</div>
    <div class="box fade-up">Box 2</div>
    <div class="box fade-up">Box 3</div>

  </div>



  <div class="spacer"></div>

  <script>


    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
        }
        else {
          entry.target.classList.remove("visible");
        }
      });


    }, { threshold: 0.10 });


    var allElements = document.querySelectorAll(".parent .fade-up");
    allElements.forEach((el) => {
      observer.observe(el);
    })
  </script>

</body>


</html>
