<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>books</title>
    <link rel="stylesheet" href="book.css">
</head>
<body>

    <div class="content">
        <div class="column1">
         <h1 class="heading1">Books</h1>
         <p class="desc">Discover a world of stories and knowledge with our curated collection of books.</p>
        
        </div>
        <div class="book-form">
            
                <input type="text" placeholder="Book Name"  id="nameInput" class="input-field">
                <input type="text" placeholder="Author Name"  id="authorInput" class="input-field">
                <input type="text" placeholder="Genre" id="genreInput" class="input-field">
                <input type="text" placeholder="Publication Year" id="yearInput" class="input-field">
                <button id="addBook" class="submit-btn">Submit</button>

                <p class="error" id="errorMessage">Please fill in all fields.</p>
        
        </div>

        <div  class="booksGrid">

        </div>
    
    </div>
    


    <script src="book.js" ></script>
</body>
</html>
