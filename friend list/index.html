<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            padding: 2rem 1rem;
        }

        h2 {
            font-size: 20px;
            font-weight: 500;
            color: #111;
            margin-bottom: 1rem;
        }

        /* friends grid */
        #friendsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            max-width: 700px;
        }

        .card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            /* shows hand cursor on hover */
            transition: border-color 0.15s;
        }

        .card:hover {
            border-color: #185FA5;
        }

        .card h3 {
            font-size: 14px;
            font-weight: 500;
            color: #111;
        }

        .card p {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }

        /* detail box */
        #detailBox {
            margin-top: 20px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 1.25rem;
            max-width: 700px;
            display: none;
            /* hidden at start */
        }

        #detailBox h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        #detailBox p {
            font-size: 14px;
            color: #555;
            margin-bottom: 4px;
        }

        /* hobby tags */
        .tag {
            display: inline-block;
            font-size: 12px;
            padding: 3px 10px;
            background: #f0f0f0;
            border-radius: 20px;
            margin: 3px 3px 0 0;
            color: #444;
        }
    </style>
</head>

<body>

    <h2>My Friends</h2>


    <div id="friendsGrid"></div>

    <div id="detailBox"></div>

    <script>

        


        const friends = [
            { name: 'Ali Hassan', age: 22, city: 'Karachi', hobby: ['Cricket', 'Gaming', 'Reading'] },
            { name: 'Sara Khan', age: 20, city: 'Lahore', hobby: ['Painting', 'Cooking', 'Yoga'] },
            { name: 'Bilal Ahmed', age: 24, city: 'Swabi', hobby: ['Football', 'Hiking', 'Music'] },
            { name: 'Ayesha Noor', age: 21, city: 'Islamabad', hobby: ['Reading', 'Travel', 'Photography'] },
            { name: 'Usman Tariq', age: 23, city: 'Peshawar', hobby: ['Coding', 'Chess', 'Cycling'] },
            { name: 'Zara Malik', age: 19, city: 'Quetta', hobby: ['Dancing', 'Drawing', 'Blogging'] },
        ];


        const grid = document.getElementById('friendsGrid');
        const detail = document.getElementById('detailBox');


        friends.forEach(function (friend, index) {

            grid.innerHTML += `
    <div class="card" onclick="showDetail(${index})">
      <h3>${friend.name}</h3>
      <p>${friend.city}</p>
    </div>
  `;

        });


        function showDetail(index) {

            const friend = friends[index];


            const hobbies = friend.hobby.map(function (h) {
                return `<span class="tag">${h}</span>`;
            }).join('');


            detail.style.display = 'block'

            detail.innerHTML = `
    <h2>${friend.name}</h2>
    <p>Age:  ${friend.age}</p>
    <p>City: ${friend.city}</p>
    <p>Hobbies: ${hobbies}</p>
  `;
        }

    </script>
</body>

</html>
