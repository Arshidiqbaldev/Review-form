<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            padding: 2rem 1rem;
        }

        .form-box {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 1.25rem;
            max-width: 580px;
            margin: 0 auto 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            padding: 9px 12px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: #185FA5;
            box-shadow: 0 0 0 2px #B5D4F4;
        }

        button {
            padding: 9px;
            font-size: 13px;
            font-weight: 500;
            background: #185FA5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0C447C;
        }

        #error2 {
            font-size: 12px;
            color: #A32D2D;
            display: none;
        }

        /* book cards */
        #bookGrid,
        #bookGrid2 {
            max-width: 580px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }


        .card2 {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card2 h3 {
            font-size: 14px;
            font-weight: 500;
            color: #111;
        }

        .card2 p {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }

        .card2 button {
            padding: 4px 12px;
            font-size: 12px;
            background: none;
            color: #A32D2D;
            border: 1px solid #A32D2D;
            border-radius: 6px;
        }

        .card2 button:hover {
            background: #FCEBEB;
        }
    </style>
</head>

<body>




    <!-- form to add a new book -->
    <div class="form-box">
        <input type="text" id="titleInput" placeholder="Book title" />
        <input type="text" id="authorInput" placeholder="Author" />
        <input type="number" id="yearInput" placeholder="Year" />
        <input type="text" id="genreInput" placeholder="Genre" />
        <button onclick="addBook()">Add book</button>
        <p id="error2">Please fill in all fields!</p>
    </div>

    <!-- books will appear here -->
    <div id="bookGrid"></div>
    <div id="bookGrid2"></div>




    <script>


        const books2 = [

        ]






        function drawBooks() {
            const grid2 = document.getElementById('bookGrid2');


            grid2.innerHTML = '';

            if (books2.length === 0) {
                grid2.innerHTML = '<p> No book found</p>';
                return;
            }

            books2.forEach(function (book2, index) {
                const card2 = document.createElement('div');
                card2.classList.add('card2');
                card2.innerHTML = `
                <h3>${book2.title}</h3>
                <p>${book2.author} . ${book2.year} . ${book2.genre}</p>
                <button onclick='deleteBooks(${index})'>Delete</button>`;
                grid2.appendChild(card2);

            });

        }


        function addBook() {

            const title2 = document.getElementById('titleInput').value.trim();
            const author2 = document.getElementById('authorInput').value.trim();
            const year2 = document.getElementById('yearInput').value.trim();
            const genre2 = document.getElementById('genreInput').value.trim();


            if (!title2 || !author2 || !year2 || !genre2) {

                document.getElementById('error2').style.display = 'block';
                return;


            };

            document.getElementById('error2').style.display = 'none';

            books2.push({
                title: title2,
                author: author2,
                year: year2,
                genre: genre2,

            });


            console.log(books2);





            document.getElementById('titleInput').value = '';
            document.getElementById('authorInput').value = '';
            document.getElementById('yearInput').value = '';
            document.getElementById('genreInput').value = '';

            drawBooks();


        }


        function deleteBooks(index) {

            books2.splice(index, 1);
            drawBooks();

        }


        drawBooks();




    </script>
</body>

</html>
