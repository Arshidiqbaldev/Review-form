<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: monospace;
            background: #f5f5f5;
            padding: 2rem 1rem;

        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #myFriendsGrid {
            display: grid;
            width: 100%;
            max-width: 900px;
            margin: auto;
            gap: 10px;
            grid-template-columns: repeat(3, 1fr);

        }




        .card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f2eaea;
            border: 1px solid rgb(223, 223, 223);
            border-radius: 20px;
            padding: 1rem;
            cursor: pointer;
        }


        .card2 {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #eaf0f1;
            border: 1px solid rgb(223, 223, 223);
            border-radius: 20px;
            padding: 1rem;
            filter: saturate(0);

        }



        .name {
            font-size: 1rem;
            text-transform: capitalize;

        }

        .age,
        .city,
        .hobby {
            font-size: 1rem;
        }


        .tag {
            background: #dbdff6;
            border-radius: 20px;
            padding: 3px 8px;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="content">
        <div id="myFriendsGrid"></div>
        <div id="friendBox"></div>
    </div>






    <script>


        const myFriends = [
            {
                name: "arshid",
                age: "20",
                city: "swabi",
                hobby: [
                    "hockey",
                    "football",
                    "cricket"
                ]
            },

            {
                name: "ali",
                age: "12",
                city: "topi",
                hobby: [
                    "hockey",
                    "baseball",
                    "cricket"
                ]
            },


            {
                name: "fazal",
                age: "21",
                city: "mardan",
                hobby: [
                    "hockey",
                    "football",
                    "cricket"
                ]
            },
        ];


        const myFriendsGrid = document.getElementById("myFriendsGrid");
        const friendBox = document.getElementById("friendBox");


        myFriends.forEach(function (friend) {
            const cardDetails = document.createElement("div");
            cardDetails.classList.add("card1");
            cardDetails.innerHTML = `
        <div class="card">
        <h2 class="name">Name: ${friend.name}</h2>
        <p class="city">City: ${friend.city}</p>
    </div>
            `;


            cardDetails.addEventListener("click", () => {
                const hobbies = friend.hobby.map((h) => {
                    return `<span class='tag'>${h}</span>`
                }).join(' ');


                friendBox.style.display = "block";
                friendBox.innerHTML = `
        <div class="card2">
        <h2 class="name">Name: ${friend.name}</h2>
        <p class="age">Age: ${friend.age}</p>
        <p class="city">City: ${friend.city}</p>
        <p class="hobby">Hobby: ${hobbies}</p>
    </div>`
            });


            myFriendsGrid.appendChild(cardDetails);



        });






    </script>

</body>

</html>
