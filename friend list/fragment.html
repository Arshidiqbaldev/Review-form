<!DOCTYPE html>
<html>
<body>
  <ul id="myList"></ul>

  <script>
    const fragment = document.createDocumentFragment();

    for (let i = 1; i <= 5; i++) {
      const li = document.createElement("li");
      li.textContent = "Item " + i;
      fragment.appendChild(li);  // Add to fragment (not DOM yet)
    }

    // Add all at once to the real DOM
    document.getElementById("myList").appendChild(fragment);
  </script>
</body>
</html>
